body:
  text: 大統厯志卷四宣城梅文鼎撰立成既有法原則數可紀矣故立成次之立成云者依法以日月五星盈縮遲疾之數預為排定以便推步取用也元志厯經步七政盈縮遲疾皆有二術其一術以三差立算者即布立成法也其又術云以其下盈縮分乘入限分萬約之以加其下盈縮積者用立成法也而遺立成未載無從入算今依大統厯通軌具録之其目有四曰太陽盈縮曰太隂遲疾曰晝夜刻曰五星盈縮餘詳法原及推步二卷厯按元史至元十七年授時厯成十九年王恂卒時雖頒然立成之數尚皆未有定稿郭守敬比類篇次整齊分秒裁為二卷而今欽天監本載嘉議大夫太史令臣王怐奉敕撰意者王先冇稿而郭卒成之者歟大統厯依授時算立成上太陽冬至前後二象盈初縮末限置八十七日下消息分六分五五六八內減初日四分九三八六餘一分六一八二為實八十七日為法除之得一八六為每日之差置本限八十八度九九二二五加入盈積度二度四千一十四分恰合得九十一度三一六二五為周嵗一象之度太陽夏至前後二象縮初盈末限置九十二日下消息分五分九二六六內減初日四分四三六二餘一分四九四為實九十二日為法除之得一六二為每日之差置本限平行九十三度七一二二五減去縮積度二度四千一十四分亦恰合得九十一度三二六二五為周嵗一象之度布立成法先依厯經盈縮招差各以其日平差立差求到每日盈縮積次以相挨兩日盈縮積相減餘為每日盈縮加分以其日加分盈加縮減一度即每日日行度又以相挨兩日加分相減餘為每日消息分再置末日消息分以初日分減之餘為實求日日數為法法除實即自然得每日消息之差也覆驗法各以其日消息分減其日加分以加其日加分加其日加分亦即得先日加分也纍積每日加分得其日盈縮積以其日盈縮積减去先日加分亦即得先日盈縮積也各又法盈初置立差三十一縮初置立差二十七各六因之得消息之差勿菴補求盈縮末日法既有初入末之日其次朔弦望但以望策纍減即得次朔望以弦䇿減之亦得弦此法用之寫算尤妙嵗既遞減訖乃取所得末日加其原列盈縮日即合半周則知不誤也丙寅十月髙麗史厯志于授時厯經後載有日行盈縮月行遲疾五星盈縮立成俱同遂不細鈔惟盈縮立成後有語二條今録於此盈初縮末限以初日行分至八十八日計得九十一度四一四二七此盈初冬至休初日行分自一日至後八十八日計得九十一度三五三四二此縮末秋分縮初盈末限以初日行分至九十三日計得九十一度五九八七一七此縮初夏至休初日行分自一日至後九十三日計得九十一度六四七二一此盈末春分太隂限數遲疾度十分定三子單分定二子十秒定一子單秒不定置月平行一十三度三六八七五以每限日行分八百二十分為法乘之又以萬約之得數一度九六二三七五是為每限月平行度也復置在位以各限損益分加减之如在疾厯則益者加之損者減之如在遲厯則益者减之損者加之即各得每限月行遲疾度數也數止秒秒以下有零數不拘多少俱收為秒勿菴注又法置小轉中一十三日七七七三以月平行度為法乘之得數一百八十四度一八五二七九三七五為實以一百六十八限為法除之得一度九六三四九四是為每限月平行度也復以各限損益分加减之即各得其限遲疾行度也數止秒秒以下棄不用此法較親加减同布立成法依厯經垜叠招差各以平差立差求到各限遲疾度次以相挨兩限遲疾度相减餘為每限損益分次各以其限損益分加减每限月平行一度九六三四九四得為各限疾遲行度也秒以下數不用其加减法在疾益加損减在遲反之其八十三四限另有變率求差之法勿菴補求限數法以所得遲疾日及今與立成日率相比而取其日率相似而略少者用之即得所用限數也不必以十二限二十分乘此法甚捷又免退一限减之煩丙寅十月初十日記欽天監祕本遲疾行度之法度歌曰天根一度九分六三三九七五齊法曰先置天根之數損益加減為分秒各限行度自然知法曰加者加入天根之內减者置天根之數减其損益分也八十三限前皆益疾加遲減是端的八十四限後皆損疾減遲加更莫疑又加減差之法十百大統厯志卷四

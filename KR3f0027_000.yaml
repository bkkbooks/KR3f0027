body:
  text: 大統厯志天文算法類二推步之屬提要臣等謹案大統厯志八卷國朝梅文鼎撰初元郭守敬作授時厯其法較古為密明初所頒大統厯即用其舊法嵗久漸差知厯者恆有異議至崇禎間徐光啓推衍西法分局測驗疏舛益明欽天監正戈豐年無以復爭乃諉其過於守敬孫承澤作春明夢餘録又力辨守敬為厯中之聖惜不能盡用其法聚訟迄無定論康熙丙午開局纂修明史史官以文鼎精於算數就詢明厯得失之源流文鼎因即大統舊法詳為推衍注釋輯為此編以持其平分原書為法原立成推步三部法原之目七曰勾股測量曰弧矢割圓曰黃赤道差曰黃赤道內外曰白道交周曰日月五星平立定三差曰里差漏刻立成之目四曰太陽盈縮曰太隂遲疾曰晝夜刻分曰五星盈縮推步之目六曰氣朔曰日躔曰月離曰中星曰交食曰五星法源所以取數立成所以作數推步所以紀法皆剖析分明具有條理蓋文鼎於象緯運行實能究極其所以然與疇人子弟沿世業而守成法者所見固不同也厯算之家測未來者當以新法推已往者則當各求以本法知其所以疏而後可以得其密知其所以舛而後可以得其真知其所以漸差而後可以窮其至變則是書雖明郭氏之法亦測天者前事之師矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀

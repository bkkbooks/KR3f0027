body:
  text: 大統厯志卷五宣城梅文鼎撰大統厯依授時立成法下冬至日後每日日出晨分半晝分法以半晝分轉減五十刻即半日周五十分也餘為日出分日出分内又減去二百五十分為晨分以晨分減日周一萬分餘為昏分昏分内又減二百五十分為日入分若順推者以半晝分加半日周為日入分又加二百五十分為昏分以昏分減日周為晨分晨分加二百五十分為日出分查表㨗法凡晨分昏分相並成日周一萬日出分日入分相並亦成日周一萬又晨分昏分之尾數四位相並成一百分日出分日入分之尾數四位相並亦成一百分即一刻若尾數三位則晨分同日出而昏分日入並同半晝皆尾數三位不變夏至日後每日日出入晨昏半晝分右立成所載日出入半晝夜晨昏分葢陽城晷刻也凡晷刻長短生於北極出地之髙下極髙則景長差多極卑則景短差平據元史所載當時四海測騐晷景之數二十有七其一為南京北極出地三十四度太強其一為河南府陽城北極出地三十四度太弱其一為嶽臺北極出地三十五度夏至晝六十刻夜四十刻今立成所載晝夜永短之數於六十則弱於四十則強故知為陽城或南京晷刻也今將元志晷差列後四海測騐南海北極出地一十五度夏至景在表南長一尺一寸六分晝五十四刻夜四十六刻衡嶽北極出地二十五度夏至日在表端無景晝五十六刻夜四十四刻嶽臺北極出地三十五度夏至晷景長一尺四寸晝六十刻夜四十刻和林北極出地四十五度夏至晷景長三尺二寸四分晝六十四刻夜三十六刻鐵勒北極出地五十五度夏至晷景長五尺一分晝七十刻夜三十刻北海北極出地六十五度夏至晷景長六尺七寸八分晝八十二刻夜一十八刻大都北極出地四十度太強夏至晷景長一大二尺三寸六分通軌作一丈一尺七寸一分晝六十二刻夜三十八刻河南陽城府北極出地三十四度太弱􅌦州北極岀地一十九度太大統厯依授時算立成北京日出入時刻晝夜長短大統歴依授時算立成五星盈縮木星盈縮同用火星盈厯火星縮厯土星盈厯大統厯志卷五
  hash: sha256:856981f7f6507de4c7659a710d4c6e87ab4d860421af36d5a700e30792becf43

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0027_WYG_006-1a, image: WYG0795/WYG0795-0926a.png}
body:
  text: 大統厯志卷六宣城梅文鼎撰釋凡四則印心厯生於數數生於理理與氣偕其中有神頥焉而不亂也變焉而有常也於是聖人以數紀之堯命羲和舜在璣衡皆是物也中遭秦炬先憲略亡自太初以後作者數十家人各效才王郭肇興大成斯集夫天不變理亦不變故厯代賢者徃徃騐天以立法要皆積有畢生之精力始得其一法之合乎理有聖人雖起不復能易者而後􅂷之不刋以至今鼎何人也敢與於斯夫創起者難為功觀成者易為力昔人縁理以立數今人因數以知理期以信吾心焉耳矣所不能信者不敢知也其或章句繁複徃復諄然夫必如是而後自信以信於古人僣越獲罪既無所逃拘滯固陋貽誚通方幸有以教存疑大統厯法所以仍元法不變者謂其法之善可以永久也夫既仍辛巳之元合用授時之數乃以今所傳較之厯經參伍多違豈别有說愚故不能無疑也按厯經上考徃古則嵗實百年長一周天百年消一下騐將來則嵗實百年消一周天百年長一此其據徃以知來自堯典𦙍征降而諸史所載可以數求者當時則既一一騐之矣而今所傳嵗實一無消長此其可疑一也又按厯經諸應等數隨時推測不用為元固也今則氣應仍是五十五日六百分周應仍是箕十度至於閏應原是二十萬一千八百五十分今改為二十萬二千五十分較授時後二百分轉應原是一十三萬一千九百四分今改為一千三萬千二百五分較授時先一千六百九十九分交應原是二十六萬千一百八十七分八十六秒今改為二十六萬千三百八十八分較授時後二百分一十四秒或差而先或差而後以之上考辛巳必與元筭不諧若據厯經以歩今茲亦與今筭不合然則定朔置閏月離交㑹之期又安所取衷也豈當時定大統厯有所測騐而改之歟夫改憲則必另立元今氣應周應俱同而獨於數者有更此其可疑二也又按厯經盈縮遲疾皆有二術其一術不用立成其一術用立成然只有用之之法而無其圖其遲疾圖則又仍如古式只二十八日日數而無逐限細率意者當時修史者之遺忽歟抑有所禁秘也今據此所載立成以求盈縮二術俱諧以求遲疾則自八十三限以至八十六限與前術有所不合意其所謂立成者有異歟據元史王恂先卒其立成之稿俱未成書郭公守敬為之整齊意者厯經前術為王公未定之稿歟此其可疑三也又如日月食開方數乃所求食分横過半徑之數據厯經皆五千七百四十乗之今改月食者為四千九百二十乗是所測闇虚小於原所測者二十分也則其所測月輪圓徑亦小於原所測者一十分也苟非實有測騐於天又何敢據此以非彼歟苟非於交食之際立渾比量周徑縱横之數何從而定歟苟非於虧復之際下漏刻以騐之定用分之多少何自而知歟此其可疑四也又有自相背馳如立成所載日出入半晝分是自冬至夏至後順數只問盈縮不言初末而通軌求日出入法又似有初末二圖此皆不可意斷者至於晝夜永短與元史所載大都刻數不同則以北極高下黄道因之所在而殊理固然也然篇首皆不言郡省撰名復載王恂豈當時九服晷漏之永短皆推有圖而元史止載其一歟然畢竟此所列者據何地為則也此其可疑五也凡此數端同異出入未敢偏據姑即所傳略附箋疏去取是非俟之君子刋誤大抵一書傳經數手多非其舊或謄冩魯魚或簡編蠧蝕故君子慎闕疑也乃若専守殘文習焉不察有所未解强入以己意參之遂使斵輪不傳糟粕并失金根輙改燕郢何憑今於其尤謬亂者是正數條或據厯經或據本書非敢逞私憑臆以重獲罪於古今也一者日月食限乃筭家所憑以定食不食者也而今所載或失而出或失而入失而入不過虚費籌策而已失而出則將據此以斷不食其有不合將以疑立法之不詳今皆據陰陽食限極之諸差所變以為常凖即據本書以定似為稍宻脫有不合其必非本筭所能御矣其日食夜刻月食晝刻亦據本書及厯經所載時差并定用分得之其月帶食若據厯經定用分尚有微差亦不多也一者月食時差分據厯經為定葢厯考古厯皆與此所載不合故斷以厯經一者黄道定積度原以嵗差推變自大衍以後為法畧同今若定鈐何異膠柱今斷以厯經仍以天啟辛酉一年歩定為式一者月食皆内分據厯經原以既内分與一十分相減相乗平方開之也今則訛為一十五分夫月食十分而既其既内五分倍之為十分而止矣安得有所謂既内十五分乎今以弦較求句股法求得既内小平圓積數皆與所求相應一如厯經原法故斷從之别有圖說以證其理一者日月帶食凡日出入分在初虧已上復圓已下是為帶食而出入也今則訛為初虧已上食甚已下是得其半而失其半求之厯經亦復仍訛故愚亦不敢全據厯經者謂有此等處也今據後已復光未復光條改為復圓分已下厥數實諧於理亦暢又月食通軌前所録數定望并晨昏分下註誤又月食分秒定子法誤又月食定用分并既内分定子俱誤又月食更㸃歸除法并定數法俱誤又逕求次年天正交泛分條誤多有閏無閏每月加數今皆刋正補遺算有所必不可畧句與字有所必不可無而或無之或畧之則非作法者之故為秘惜也如日食交前後條正交交定度在七度已下數雖在正交度下而實則陽厯交後度也法宜加交終度減之此筭之所必不可畧者也乃此書既不之載至元厯經亦復闕焉何也夫此亦數之易知當必非所甚秘豈非梨棗鉛槧者之責乎將謂精於筭者自能知之而無所用書歟今輙斷之以理重為補定古人而得見我何以幸教之也又如定子法為乗除後進退而設甚便於初學其立法立意不可謂不至也乃多有遺去言十定一不滿法去一二語者夫定子所以御乗除之變而此二語又所以通定子之窮若無此二語則何如不定子之為愈乎又如求天正赤道黄道度二條皆不用定子夫赤道不定子知其所減者為度位乎為分位乎黄道乗除不用定子固也然何以處夫除不滿法與夫減過積度只剰秒微者乎又如食甚入盈縮條遺食甚甚字夘酉前後條遺定望望字凡此皆字與句之所必不可無者也今皆補定日月交食通軌用數目録周天三百六十五度二十五分七十五秒按此即周天分渾然本體其數則亦以日度紀之也半周天一百八十二度六十二分八十七秒半按此即周天二象之數乃二分周天之一半嵗周一百八十二度六十二分一十二秒半按此乃太陽行天半嵗之數即不及半周天之七十五秒也周天象限九十一度三十一分四十三秒七十五微按此乃四分周天之一象者四象陰陽老少也交終度三百六十三度七十九分三十四秒一十九微六按此以月平行度乗交終之數月入交一轉凡行天度有此數也交中度一百八十一度八十九分六十七秒九八按此以月平行乗半交之數月入交一半凡行天度有此數也正交度三百五十七度六十四分按此於交終度内減去六度一五有竒也中交度一百八十八度五分按此於交終度内加入六度一五有竒也日食入交度有加減者日既高於月黄道在天亦高於月道故當其初入陰厯六度時月之行天雖在日北而人之見月尚在日南中交度所以有加也及其將入陽厯尚差六度時月之行天雖在日内而人之見月已出日外正交度所以有減也此古人測騐之宻也其所以然則亦中國地勢為之前凖一百六十六度三十九分六十八秒按前者交前也入陰厯滿此是在正交前也入陽厯滿此是在中交前也以後凖減交中即得後凖一十五度五十分按後者交後也入陽厯在此數以下是正交後也入陰厯在此數以下是中交後也凖者定也凡月食在交前後以此為定葢無論交前交後皆以十五度五十分為定過此則不食也前凖數雖多以減交終度則亦十五度五十分也日周一萬分按自子正初刻至夜子初四刻有此分即授時日法也唐末民間曽有萬分厯半日周五千分按自子正初刻至午初四刻或自午正初刻至夜子初四刻皆有此分月平行分一十三度三十六分八十七秒半按置月行極遲極疾度數一轉之積以月行一轉之日平分之得此數日行分八分二十秒按此乃一限之日行分也月行一限在日周一萬内得八百二十分也葢萬分日之百即百分度之一分也刻已上日月皆食案此句上有缺文後二已字下有脱字在日五千四百五五已日月皆食在二十五日六一五一已上日月不食在一十二日八九已上日月不食在一十四日一五一六已下日月皆食陰食入交在一日二十五刻已下不食在一十二日四十二刻已月食在一日一八七二已下日食在二十六日二四九已上日月皆食在一十二日四一八九已上在一十四日七九三三已下又在交望一十四日七六五二九六五已下日月皆食又在交終二十七日二一二二二四已下日月皆食又在交中一十三日六六一一二已下日月皆食右各日月食限如日食視其定朔小餘在夜刻者如月食視其定望小餘在晝刻者即同不食亦不必推算也又與各交泛者數同則食也不同者不食其已上已下皆指小餘而言凡數自萬已上為大餘自千已下為小餘凡日食視其定朔小餘在一千二四九已下八千八百已上皆在夜刻也起亥初初刻止丑正四刻凡月食視其定望小餘在三千一六已上七千八三已下皆在晝刻也起辰初初刻止申正四刻日食分二十分按此置日食十分倍之併日體月影各十分即二十分月食分三十分按此置月食一十五分倍之倂月體十分闇虚二十分共三十分陰食限八度定法八十分按陰者月入陰厯是在黄道北在日内也在日内則易為揜故八度食也陰食八度故陰定法亦八十分以八十分除八度即得陰食十分也陽食限六度定法六十分按陽者月入陽厯是在黄道南在日外也在日外則難為揜故六度食較陰食近也陽食六度故陽定法亦六十分除六度即得陽食十分也月食限一十三度五分定法八十七分按以月食定法八七除一十三度五分即得月食一十五分也月既小於闇虚闇虚所至即月所至無高小故不論陰陽厯皆十三度即食也闇虚者日之影倍大於月故月食十有五分所謂既内既外也日月食限數凡數滿萬為日千為十刻百為單刻陽食入交在日五十刻已下日月不食在二十六日二刻已上日月皆食在一十三日刻已上日月皆食在一十四日七十五按自定朔之法行而日食必在朔厯家以是騐其疎密者千有餘年矣厯至授時法益密數亦簡雖然月有交也逐交歩算雖簡亦繁許學士之譏世醫謂獵不知兎廣絡原野術已疎矣今通軌所載食限顛倒繆亂殆不可以數求其誤後學將何已乎愚不自揣輙為訂定如左今考定日月入交食限朔汎交入陽厯在日五一六已下為入食限已上者日不食月平行乗之得六度七五七六五為陽厯距正交後度在一十三日一四五已上為入食限已下者日不食月平行乗之得一百七十五度一九一八四三七五為陽厯距中交前度朔泛交食陰厯在一十四日不問小餘皆入食限月平行一百八十七度一六二五其小餘在一五一六已下一三七已上者的食在一十五日一七七九已下為入食限已上者不食在二十五日六四四已上為入食限已下者日不食在二十六日不問小餘皆入食限其小餘在六六六七已上六八七六已下者的食又在交終二十七日二一二二二四已下為入食限又在交中一十三日六六一一二已上為入食限望泛交不問陰陽厯在日不問小餘皆入食限其小餘在七九六六已下者月的食在一日一五五六已下為入食限已上者不食在一十二日四五五已上為入食限已下者不食其小餘在八九五已上者月的食在一十四日七六一七已下為入食限已上者不食其小餘在四二七已下者月的食在二十六日五六六已上為入食限已下者不食其小餘在四一五六已上者月的食又在交終二十七日二一二二二四已下月的食又在交中一十三日不問小餘皆的食右日月食限皆視其朔望入交汎日其入不食限者即不必布算也其入的食限者必食也其入食限不言的者或食也或不食也是皆以筭御之也凡言已上已下者皆指小餘有不問小餘者則只以大餘命之也又視其定朔小餘如在日入分後及日出分前十分已上者夜刻也定望小餘如在日入分前及日出分後七百三十分已上者晝刻也日食在夜刻月食在晝刻即不得見初虧復圓同不食限不必布筭也按日食陰厯距交前後二十一度而止以月平行除之得一日五七一八日食陽厯距交前後六度七十一分而止以月平行除之得日五一六即各其食限也其陰厯距交前後七度一三四至七度二九三四為日的食限月平行除之得日五千二百四六至日五千四百五五也其陽厯則無的食何也葢日食雖有陽食限六度陰食限八度其實總在陰厯陽厯本無蝕法也今所定陽厯食限以諸差得之皆或限也諸差者何一曰盈縮差加減之極至二度四十分一曰南北東西差加減之極至四度四十六分并二數六度八十六分内除未交陽厯前原空有一十五分餘六度七十一分是為陽厯食限也其陰厯的食起七度一至七度二九止者正交中交限距交皆六度一十五分而陽食限只六度是原空一十五分也加入盈縮差并南北東西差六度八十六分共七度一而差變極矣故的限以此起置正交中交距交數加陰食限八度共一十四度一十五分内減去盈縮并減去東西南北差餘七度二九而差變極矣故的限以此終不入此限度皆或限也置正交中交距交數加陰食限共一十四度一十五分又加入盈縮差又加入南北東西差共二十一度是為陰厯食限也葢極其變可以得其常執其常可以追其變今所訂定食限皆要其變之極者言之而其常可知也又按月食不問陰陽厯只距交前後一十五度四十五分而止在月平行得一日一五五六為食限也其距交前後一十度六十五分在月平行得日七九六六為的食限也夫月食何以不問陰陽厯也月之掩日以形形則有所不周日之掩月以氣氣則無所不及故日必以陰厯食月不問陰陽厯皆食陽全陰半之理也又月雖掩日尚不能直至於日之所也故有東西南北差日以闇虚掩月則直至於月之所也故亦無東西南北差惟其不用東西南北差也故只以盈縮差二度四十分加其食限一十三度五分而得食限一十五度四十五分或食之數止此而差變極也只以盈縮差二度四十分減其食限一十三度五分而得的食限一十度六十五分或不食之數亦至此而變極也又按夜刻不見日食以時差分與定用分相較知之大約日出入夘正酉正合朔當之時差之多至六百五十分若當二至日出入其差乃極亦不下六百三十分故定朔分若與日出入同者其食甚皆在日出前日入後六百三十分已上也假如日食十分當月行極遲之限定用分極多至六百三十五分止矣故知定朔在日出分前一十分以下者即不得見未復光定朔在日入分後一十分以上者即不得見初虧斷為夜刻無疑也其晝刻不見月食亦以時差分與定用分相較知之依授時時差法望在夘酉正時差之多至一百三十分若當二至日出入其差為極亦不下八十九分故定望若與日出入分同者其食甚皆在日出前日入後八十九分已上也假如月食十五分當月行極遲之限定用分多至八百一十六分止矣故知定望在日出分後七百三十分已上者即不得見初虧定望在日入分前七百三十分已上者即不得見未復光斷為晝刻無疑也授時筭月食時差法見後時差條又按大術厯有九服交食法庚午元厯有里差自宋以前厯皆有晷漏所在差數今所定只據授時厯經所載大都食法其日出入據立成所載或是順天漏刻也餘處再消息之大統厯志卷六

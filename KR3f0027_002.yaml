front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0027_WYG_002-1a, image: WYG0795/WYG0795-0860a.png}
body:
  text: 大統厯志卷二宣城梅文鼎撰黄赤道内外度推黄道各度距赤道内外術置周天半徑内減去赤道小弦餘為赤道二弦差又為黄赤道小弧矢又為内外矢又為股弦差置半徑内減去黄道矢度餘為黄赤道小弦以二至黄赤道内外半弧弦乗之為寔以黄赤道大弦為法即周天半徑法除寔為黄赤道小弧弦即黄赤道内外半弧弦又為黄赤道小勾置黄赤道小弧矢自之即赤道二弦差以周天徑除之為半背弦差以差加黄赤道小弧弦為黄赤道小弧半背即黄赤道内外度求黄道各度去北極逺近術置黄道各度所推黄赤道内外度視在盈初縮末限以加在縮初盈末以減皆加減象限度即各得太陽去北極度及分秒如冬至後四十四度求太陽去赤道内外及去極度術曰置周天半徑六十度八十七分半内減黄道四十四度下赤道小弦五十八度三十五分六十九秒餘二度五十一分八十一秒為黄赤道小弧矢即内外矢置半徑六十度八七五内減黄道四十四度矢一十六度五十六分八十二秒餘四十四度三十分六十八秒為黄赤道小弦置黄赤道小弦以二至黄赤道内外半弧弦二十三度七十一分乗之得一千五十度五十一分四二三八為寔以黄赤道大弦六十度八七五為法除之得一十七度二十五分六十九秒為黄赤道小弧弦即内外半弧弦置黄赤道小弧矢二度五十一分八十一秒自之為寔以圓徑一百二十一度七十五分為法除之得五分二十一秒為背弦差以差加黄赤道小弧弦一十七度二十五分六十九秒共得一十七度三十分八十九秒為二至前後四十四度太陽去赤道内外度置象限九十一度三十一分四十三秒七五以内外度一十七度三八九加之得一百八度六十二分三十二秒七五為冬至後四十四度太陽去北極度黄道每度去赤道内及去北極立成白道交周推白赤道正交距黄赤道正交極數術曰置寔測白道出入黄道内外六度為半弧弦又為大圓弧矢又為股弦差置周天半徑六十度八七五自之得三千七百五度七六五六二五以矢六度而一得六百一十七度六十三分為股弦和加矢六度共六百二十三度六十三分為大圓徑依法求得容闊五度七十分又為小勾又以二至出入半弧弦二十三度七十一分為大勾以大勾為法除大股五十六度六分五十秒得二度三十七就整為度差以度差乗小勾得小股一十三度四十七分八十二秒為容半長置周天半徑為大弦以乗小勾五度七十分為寔以大勾二十三度七十一分為法除之得一十四度六十三分為小弦又為白赤道正交距黄赤道正交半弧弦依法求得半弧背一十四度六十六分為白赤道正交距黄赤道正交極數里差刻漏北京北極出地四十度九十五分寔測半弧背二至黄赤道内外度二十三度九十分寔測半弧背二至黄赤道内外半弧弦二十三度七十一分又為黄赤道大勾又為小三斜中弦北京二至出入差股一十五度二十九分又為小三斜中股又為小股二至出入差半弧弦一十九度八十七分又為小弦二至出入差半弧背一十九度九十六分一十四秒度差八十四分一十九秒冬至去極一百一十五度二十一分七十三秒夏至去極六十七度四十一分一十三秒夏至晝冬至夜六十一刻八十四分冬至晝夏至夜三十八刻一十六分求二至差股及出入差術曰置所測北極出地四十度九十五分為半弧背以前割圓弧矢法推得出地半弧弦三十九度二十六分為大三斜中股置測到二至黄赤道内外度二十三度九十分為半弧背以前法推得内外半弧弦二十三度七十一分又為黄赤道大勾大小三斜弦置内外半弧弦自之為勾羃周天半徑自之為弦羃二羃相減開方得股以股轉減周天半徑得餘四度八十一分為二至出入矢即黄赤道内外矢夏至日南至地平七十四度二十六分半為半弧背求得日下至地半弧弦五十八度四十五分半圓徑六十度八十七分半為大三斜中弦置大三斜中股三十九度二十六分以二至内外半弧弦二十三度七十一分乗之為寔以半徑六十度八十七分半為法除之得一十五度二十九分為小三斜中股又為小股置小三斜中股一十五度二十九分去減日下至地半弧弦五十八度四十五分餘四十三度一十六分為大股以出入矢四度八十一分去減半徑六十度八十七分半餘五十六度六分半為大股法置大股弦以小股一十五度一九乗之為寔大股四十三度一六為法除寔得一十九度八十七分為小弦即為二至出入差半弧弦置二至出入差半弧弦依法求到二至出入差半弧背一十九度九十六分一十四秒置二至出入差半弧背一十九度九六一四以二至黄赤道内外半弧弦二十三度七十一分除之得八十四分一十九秒為度差分求黄道毎度晝夜刻術曰置所求毎度黄赤道内外半弧弦以二至出入差半弧背乗之為寔二至黄赤道内外半弧弦為法除之為所求毎度出入差半弧背又術置黄赤道内外半弧弦以度差八十四分一十九秒乗之亦得出入差半弧背置周天半徑内减所求黄赤道内外矢又術以赤黄道内外矢倍之以減周天全徑餘數三因加一度為日行百刻度亦同置毎度出入半弧背以百刻乗之爲實日行百刻度為法除之得數為出入差刻置二十五刻以出入差刻黄道在赤道内加之在赤道外減之得數為半晝刻倍之為晝刻以減百刻為夜刻如求冬至後四十四度晝夜刻術曰置所求冬至後四十四度黄赤道内外半弧弦一十七度二十五分六十九秒又為黄赤道小弧弦前立成中敘之以二至出入差半弧背一十九度九十六分一十四秒乗之為寔以二至黄赤道内外半弧弦二十三度七十一分為法除之得一十四度五十二分八十五秒為所求出入半弦背又法置黄赤道内外半弧弦一十七度二五六九以度差度八四一九乗之亦得一十四度五二八五為出入半弧背置周天半徑六十度八七五以四十四度黄赤道内外矢二度五十一分八十一秒又為赤道二弦差前條立成中貶之減之餘五十八度三十五分六十九秒即赤道小弦倍之得一百一十六度七十一分三十八秒三因之加一度得三百五十一度一十四分一十四秒為日行百刻度又術倍黄赤道内外矢得五度三分六十二秒以減周天全徑一百二十一度七十五分亦得一百一十六度七十一分三十八秒三因加一為日行百刻度並同置出入半弧背一十四度五十二分八十五秒以百刻乗之為寔以日行百刻度三百五十一度一十四分一十四秒為法除之得四刻一十三分七十五秒為出入差刻置二十五刻以出入差刻四刻一十三分七十五秒減之因冬至後四十四度黄道在赤道外故減餘二十刻八十六分二十五秒為半晝刻倍之得四十一刻七十二分半為晝刻以晝刻減百刻餘五十八刻一十七分半為夜刻又術置出入差刻四刻一十三分七十五秒倍之得八刻二十七分半以減春秋分晝夜五十刻得四十一刻七十二分半為晝刻以倍刻加五十刻得五十八刻二十七分半為夜刻晝減故夜加餘倣此大統厯志卷二

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0027_WYG_001-1a, image: WYG0795/WYG0795-0847a.png}
body:
  text: 大統厯志卷一宣城梅文鼎撰大統厯法一法源史載厯法必載其所以厯法之原如太初諸厯起數鐘律一行大衍求端河洛是也古今厯法惟授時厯獨以測驗算術為宗以為與天既合則律吕之損益易象之竒偶悉在其中不必一一牽附矣考郭守敬傳有修改源流一卷儀像法式二卷厯議擬稿三卷二至晷景考二十卷五星細行考五十卷古今交食考一卷新測二十八舍雜坐諸星入宿去極一卷新測無名星一卷並藏之官又齊履謙傳之授時厯有經串經以著定法串以紀成數履謙又作經串演撰八法一卷以求其法之所以然數之所從出作元史者漫無采托而僅存履謙之厯議録厯經之初稿及儀象大略而已其三應改率及立成之數與夫黃赤道割圓弧矢之法日月五星平立定三差之原盡削不載使作者精意湮沒識者憾焉今據大統厯及通軌及厯草諸書稍為銓次著於篇而仍以法原為首其目七曰勾股測望曰弧矢割圓曰黃赤道差曰黃赤道內外度曰白道交周曰日月五星平立定三差曰里差刻漏勾股測望北京立四丈表冬至日測得正午景長七丈九尺八寸五分以簡儀測到冬至日南至地平二十六度四十六分五十秒為半弧背求得矢度五度九十一分半置周天半徑截矢餘五十四度九十六分為股乃本地去戴日下之度以弦股别勾術求得勾二十六度一十七分六十六秒為日下至地度即冬至日出地半弧弦北京立四丈表夏至日測得正午景長一丈一尺七十一分按元史作一丈二尺三寸六分以簡儀測到夏至日南至地平七十四度二十六分半為半弧背求得矢度四十三度七十四分少置周天半徑截矢餘一十七度一十三分二十五秒為勾乃本地去戴日下之度以勾弦别股術求得股五十八度四十五分半為日下至地度即夏至日出地半弧弦以二至日度相併得一百度七十三分折半得五十度三十六分半為北京赤道出地度轉減周天四之一餘四十度九十四分九十三秒七十五微為北京北極出地度弧矢割圓周天徑一百二十一度七十五分少半徑六十度八十七分半又為黃赤道大弦二至黃赤道內外半弧背二十四度所測就整二至黃赤道弧矢四度八十四分八十二秒黃赤道大勾二十三度八十分七十秒黃赤道大股五十六度二分六十八秒割圓求矢術置半弧背度自之為半弧背羃周天徑自之為徑羃又為上廉二羃相乘得數為正實徑羃乘徑得數為益從方半弧背倍之乘徑得數為下亷置初商為上法以乘上亷得數以減益從方餘為從方置初商自之以減下廉餘以初商乘之得數為從廉從方從廉相並為下法下法乘上法以減正實而定初商有不盡者次第商除則次商又為上法置初商倍之得數與次商相並以乘上廉得數以減益從方餘為從方并初商次商而自之又以初商自之並二數以減下亷餘以初商倍數並次商乘之得數為從廉從方從廉相並為下法下法乘上法以減餘實而定次商有不盡者如法商之皆以商得數為矢度之數黃赤道同用如以半弧背一度求矢度術曰置半弧背一度自之得一度為半弧背羃置周天徑一百二十一度太自之得一萬四千八百二十三度六分二十五秒為徑羃又為上廉二羃相乘得一萬四千八百二十三度六分二五為正實徑羃又乘徑得一百八十萬四千七百七度八十五分九十三秒七五為益從方半弧背一度倍之得二度以乘徑得二百四十三度五十分為下廉初商八十秒為上法置初商八十秒乘上廉一萬四千八百二十三度六二五得一百一十八度五八四五以減益從方一百八十萬四千七百七度八五九三七五餘一百八十萬四千五百八十九度二七四八七五為從方又置初商八十秒自之得六十四微以減下廉餘二百四十三度四九九九九三六仍以八十秒乘之得一度九四七九九九四八八為從廉以從廉從方並之共得一百八十萬四千五百九十一度二三二八七四四八八為下法下法乘上法得一萬四千四百三十六度七十二分九七八二九九五九四以減正實餘實三百八十六度三十三分二七一七四九六次啇二秒為上法置初啇八十秒倍之得一分六十秒加次啇二秒得一分六十二秒乘上廉一萬四千八百二十三度六二五得一分六十二秒乘上廉一萬四千八百二十三度六二五得二百四十度一二三六一二五以減益從方餘一百八十萬四千四百六十七度七二五七六二五為從方又置初次啇八十二秒自之得六十七微加初啇八十秒自之數得一秒三十一微以減下廉餘二百四十三度四九九八六九以前所得一分六十二秒乘之得三度九十四分四六九七八七七八為從廉以從廉從方並得一百八十萬四千四百七十一度六十七分四六三七七八為下法下法乘上法得二百六十度八九四三三四九二七五五六以減餘實仍餘二十五度四三八三八二九一二二四四不足一秒棄不用後同凡求得矢度八十二秒如以半弧背二度求矢度用上法得矢三分二十八秒如以半弧背二十四度求矢度用上法得矢四度八十四分八十二秒如以半弧背四十四度求矢度用上法得矢一十六度五十六分八十二秒餘度各如上法求到矢度以為黃赤相求及其內外度之根數詳後黃赤道差求黃道各度下赤道積度術置周天半徑度分內減去黃道矢度餘為黃赤道小弦置黃赤道小弦以黃赤道大股乘之大股見割圓為實黃赤道大弦半徑為法實如法而一為黃赤道小股置黃道矢自乘為實以周天全徑為法實如法而一為黃道半背弦差以差去減黃道積度即黃道半弧背餘為黃道半弧弦置黃道半弧弦自之為股羃黃赤道小股自之為勾羃二羃並之以開平方法除之為赤道小弦置黃道半弧弦以周天半徑亦為赤道大弦乘之為實以赤道小弦為法而一為赤道半弧弦置黃赤道小股亦為赤道橫小勾以赤道大弦即周天半徑乘之為實以赤道小弦為法而一為赤道橫大勾以減半徑餘為赤道橫弧矢橫弧矢自之為實以周天全徑為法而一為赤道半背弦差以差加赤道半弧弦為赤道積度如黃道半弧背一度求赤道積度術曰置周天半徑六十度八十六分五十秒即黃赤道大弦內減黃道矢八十二秒餘六十度八六六八為黃赤道小弦置黃赤道小弦以黃赤道大股五十六度二六八乘之得三千四百一十度一七二三二四為實以黃赤道大弦六十度八七五為法實如法而一得五十六度一分九十二秒為黃赤道小股又為赤道小勾置矢度八十二秒自之得六十七微以周天徑一百二十二度七五為法除之得五十五纎為黃道半背弦差置黃道弦背一度內減黃道半弧背差餘為半弧弦因差在微以下不減即用一度為半弧弦置黃道半弧弦一度自之得一度為股羃黃赤道小股五十六度一九二自之得三千一百三十八度一五七六八六四為勾羃二羃並得三千一百三十九度空七六八六四為弦實平方開之得五十六度二八一為赤道小弦置黃道半弧弦一度以周天半徑即赤道大弦乘之得六十度八七五為實以赤道小弦五十六度二八一為法除之得一度八分六十五秒為赤道半弧弦置黃赤道小股五十六度一九二又為赤道小勾以赤道大弦半徑六十度八七五乘之得三千四百一十度一六八八為實以赤道小弦為法除之得六十度八十六分五十三秒為赤道橫大勾置半徑六十度八十七分五十秒內減赤道大勾六十度八十六分五十三秒餘九十七秒為赤道橫弧矢置赤道橫弧矢九十七秒自之得九十四微九以周天徑為法除之得七十七纎為赤道背弦差置赤道半弧弦一度八分六十五秒加赤道背弦差為赤道積度今差在微以下不加即用半弧弦為積度凡求得赤道積度一度八分六十五秒如黃道二度下赤道積度二度一十七分二十八秒如求黃道二十四度下赤道積度用上法得赤道積度二十五度七十七分五十二秒如求黃道四十四度下赤道積度用上法得赤道積度四十六度三十分八十五秒餘度各如上法求到各黃道度下赤道積度乃至後之率其分後以赤道度求黃道及此求之得數並同黃赤道相求弧矢諸率立成按郭守敬創法五端內一曰黃赤道差此其根率也舊法以一百一度相減相乘授時立術以勾股弧矢方圓斜直所容求其差數合於渾象之理視古為密顧至元厯經所載甚略又誤以黃道矢度為積差黃道矢差為差率今正之按舊史無圖然表亦圖之屬也今勾股割圓弧矢黃赤道推變諸法實為厯家測算之本非圖不明因存其要者數端大統厯志卷一

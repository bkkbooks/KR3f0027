body:
  text: 大統厯志卷三宣城梅文鼎撰黃道每度晝夜刻立成右厯草所載每度晝夜刻分乃授時原定大都晷漏大都者燕京也夏至晝冬至夜極長六十一刻八十四分冬至晝夏至夜極短三十八刻一十六分元史有云六十二刻者就整數耳明既都燕不知遵用惟正統己巳年奏准頒厯用六十一刻而羣然非之士大夫既未考諸元史疇人子弟失其官守又不能執厯草以爭遂旋行而罷終明之世皆用南京之軌漏而已太陽盈縮平立定三差之原冬至前後盈初縮末限八十八日九十一刻就整離為六段每段各得一十四日八十二刻就整各段實測日躔度數與平行相較以為積差各置其段積差以其段積日除之為各段日平差平差與後段日平差相減為一差置一差與後段一差相減為二差日平差一差二差置第一段日平差四百七十六分二十五秒為泛平積第一段二差一分三十八秒去減第一段一差三十八分四十五秒餘三十七分七秒為泛平積差另置第一段二差一分三十八秒折半得六十九秒為泛立積差以泛平積差三十七分七秒加入泛平積四百七十六分二十五秒共得五百一十三分三十一秒為定差以泛立積差六十九秒去減泛平積差三十七分七秒餘三十六分三十八秒為實段日一十四日八十二刻為法除之得二分四十六秒為平差置泛立積差六十九秒為實段日一十四日八十二刻為法除兩次得三十一微為立差盈初縮末三差用數立差三十一微平差二分四十六秒定差五百一十三分夏至前後縮初盈末限九十三日七十一刻就整離為六段每段各得一十五日六十二刻就整各段實測日躔度數與平行相較以為積差推日平差一差二差術與盈初縮末同日平差一差二差置第一段日平差四百五十一分九十二秒為泛平積以第二差一分三十三秒去減第一段一差三十六分四十七秒餘三十五分一十四秒為泛平積差另置第一段二差一分三十三秒折半得六十六秒五十微為泛立積差以泛平積差三十五分一十四秒加入泛平積四百五十一分九十二秒共四百八十七分六秒為定差以泛立積差六十六秒五十微去減泛平差三十五分一十四秒餘三十四分四十七秒五十微為實段日一十五日六二為法除之得二分二十一秒為平差置泛立積差六十六秒五十微為實段日一十五日六二為法除二次得二十七微為立差縮初盈末三差用數立差二十七微平差二分二十一秒定差四百八十七分六秒凡求盈縮皆以入厯初末日乘立差得數以加平差再以初末日乘之得數以減定差餘數以初末日乘之為盈縮積凡盈厯以八十八日九九二二五為限縮厯以九十三日七一二二五為限在其限以下為初以上轉減半嵗周餘為末盈初八十八日九九二二五是從冬至後順推縮末亦八十八日九九二二五是從冬至前逆溯其距冬至同故其盈積同縮初九十二日七一二二五是從夏至後順推盈末亦九十三日七一二二五是從夏至前逆溯其距夏至同故其縮積同凡布立成盈初縮末置立差三十一微以六因之得一秒八十六微為加分立差置平差二分四十六秒倍之得四分九十二秒加入加分立差得四分九十三秒八十六微為平立合差置定差五百一十三分三十二秒內減平差二分四十六秒再減立差三十一微餘五百一十分八十五秒六十九微為加分縮初盈末置立差二十七微以六因之得一秒六十二微為加分立差置平差二分二十一秒倍之得四分四十二秒加入加分立差得四分四十三秒六十二微為並立合差置定差四百八十七分六秒內減平差二分二十一秒再減立差二十七微餘四百八十四分八十四秒七十三微為加分以上所推皆初日之數其推次日皆以加分立差纍加平立合差為次日平立合差以平立合差減其日加分為次日加分盈縮並同其加分纍積之即盈縮積其數並見立成太陰遲疾平立定三差之原太陰轉周二十七日五十五刻四六測分四象象各七段四象二十八段每段十二限每象八十四限凡三百三十六限而四象一周以四象為法除轉周日得每象六日八八八六五以分七段每段下實測月行遲疾之數與平行相較以求積差積限積差各置其段積差以其段積限為法除之為各段限平差置各段限平差與後段相減為一差置一差與後段一差相減為二差限平差一差二差第七段六分四五六四置第一段限平差一十分七二六為泛平積置第一段一差四十七秒七六以第一段二差九秒三六減之餘三十八秒四十微為泛平積差另置第一段二差九秒三十六微折半得四秒六十八微為泛立積差以泛平積差三十八秒四十微加泛平積一十分七二得一十二分一十一秒為定差置泛平積差三十八秒四十微以泛立積差四秒六十八微減之餘三十三秒七十二微為實以十二限為法除之得二秒十一微為平差置泛立積差四秒六十八微為實十二限為法除二次得三微二十五纎為立差太陰遲疾三差用數立差三微二十五纎平差二秒八十一微定差一十一秒一十一凡求遲疾皆以入厯日乘十二限二十分以在八十四限以下為初以上轉減一百六十八限餘為末各以初末限乘立差得數以加平差再以初末限乘之得數以減定差餘以初末限乘之為遲疾積其初限是從最遲最疾處順推至後末限是從最遲最疾處逆溯至前其距最遲疾處同故其積度同月與日立法同但太陽以定氣立限故盈縮異數大陰以平行立限故遲疾同原布立成法置立差三微二十五纎以六因之得一十九微五十纎為損益立差置平差二秒八十一微倍之得五秒六十二微再加積益立差一十九微五十纎共得五秒八十一微為初限平立合差自此以損益立差纍加之即每日平立合差至八十限下積至二十一秒四一五為平立合差之極八十一限下差一秒七八九八十二限下一秒七八八至八十二限下平立合差與益分中分為益分之終八十四限下差亦與損分中分為損分之始至八十六限下差亦二十一秒四一五自此以損益立差纍減之即每限平立合差至末限與初限周置定差一十一分一十一秒內減平差二秒八十一微再減立差三微二十五纎餘一十一分八秒一十五微七十五纎為加分定差即初限損益分置損益分以其限平立合差益減損加之即為次限損益分以益分積之損分減之便為其下遲疾度以八百二十分為一限日率加八百二十分為每限日率以上俱詳立成五星平立定三差之原凡五星各以實測分其行度為八段以求積差略如日月法木星立差二微三十六纎加平差二秒五十九微一十二纎減定差一十分八十九秒七十微積日積差各置其段所測積差度分為實以段日為法除之為泛平差各以泛平差與次段泛平差相較為泛平較又以泛較與次段泛平較相較為泛立較置第一段泛平較三十九秒一六二一減其下泛立較六秒二四二二餘三十二秒九一九九為初段平立較加初段泛平差一十分五六七八一共得一十分八十九秒七十微為定差秒置萬位置初段平立較差三十二秒九十九九內減泛立較之半三秒一二一一餘二十九秒七九八八以段一十一日五十刻除之得二秒五十九微一十二纎為平差置泛立差之半三秒一二一一以段日為法除二次得二微三十六纎為立差以上為木星平立定三差之原火星盈初縮末立差一十一微三十五纎減平差八十三秒一十一微八十九纎減定差八十八分四十七秒八十四微積日一段七日六十刻二段一十五日二十五刻三段二十二日八十七刻五十分四段三十日五十刻五段三十八日一十二刻五十分六段四十五日七十五刻七段五十三日三十七刻五十分八段六十一日積差一段六度二六八二五一二二八一八五五九三七五二段一十一度六一七五七四三五九三七五三段一十六度二五九六三七九二五一九五三一二五四段一十九度六六九一三六二一二五五段二十二度二七九八九一四七六七四二一八七五六段二十四度一六八二二八六三二八一二五七段二十五度三三一五五六二四九二六一五六二五八段二十五度六一九五一五六六泛平差一段八十二分六五七三四八四三七五二段七十六分六六七二六一六七五三段七十分五八八五八一九三七五四段六十四分一八二九六九二五五段五十八分四三九五九六九三七五六段五十二分八二七一二九一八七五七段四十七分三四七一七七九八四三七五八段四十一分九九九二六泛平較一段六分一二九八四七二九六八七五二段六分七八六八七八一二五三段五分八七五八八八八五九三七五四段五分七四三九九六四六二五五段五分六一一九三四二一八七五六段五分四七九九五一二三一二五七段五分三四七九七一九八四三七五泛立較一段一十三秒一九七九二一八七五二段一十三秒一九七九二一八七五三段一十三秒一九七九二一八七五四段一十三秒一九七九二一八七五五段一十三秒一九七九二一八七五六段一十三秒一九七九二一八七五泛平較前多後小應扣泛立較取初段下泛平較六分一三九八四七二九六八七五加泛立較一十三秒一九七九二一八七五得六分二七一八二六五一五六二五為初日下半立較置初段泛平差八十二分二十秒六五七三四八四三七五加初日下立平較六分二七一八二六五一五六二五得八十八分四十七秒八十四微為盈初縮末定差置初日下平立較六分二七一八二六五一五六二五加泛立較之半六秒五九八九六九三七五得六分三三七八一六一二五為實以一段下積日而一得八十三秒一十一微八十九纎為盈初縮末平差置泛立較之半六秒五九八九六九三七五以一段十七日六十二刻五十分為法除二次得一十一微三十五纎為盈初縮末立差火星縮初盈末立差八微五十一纎平差三秒二微三十五纎損減定差二十九分九十七秒六十三微積日一段一十五日二十五刻二段三十日五十刻三段四十五日七十五刻四段六十一日五段七十六日二十五刻六段九十一日五十刻七段一百六日七十五刻八段一百二十二日積差一段四度五三一二五一八五七九六八七五二段九度一二九六一四五一二五三段十三度五三一六七九一七七三七五四段一十七度四七八九七五四五段二十度八四三六六三六六四六二五六段二十三度四三一三三六二四一二五七段二十五度九二四三五二八三四六八七五八段二十五度六一八三七四七二泛平差一段二十九分七一三一二六九三七五二段二十九分八四五七七五二五三段二十九分五七八三五五六二五四段二十八分六五四六四五段二十七分三三三九五一五六二五六段二十五分六一八一七七五七段二十三分五六二六二五六二五八段二十分九九八六八六泛平較一段一十三秒二六四八三一二五二段二十六秒八四一八八七五三段九十二秒四二九一六二五四段一分三二一一二四三七五五段一分七一五九三三八一二五六段二分一一一七五五一八七五七段二分五七五七六五六二五泛立較一段一十三秒五七六九七七五二段六十五秒五八七二九七五三段三十九秒五八二一三七五四段三十九秒四八二一三七五五段三十九秒三八五一三七三六段三十九秒五八二一三七五七段闕取泛立較均停者三十九秒五八二一三七五以較一段下泛平較一十三秒二六四八三一二五餘二十六秒三一七三六二五為較較以加一段下泛平差二十九分七一三一二六九三七五得二十九分九十七秒六十三微為縮初盈末定差置較較二十六秒三一七三六二五以一段日一十五日二十五刻而一得一秒七二五七二五再置泛立較之半一十九秒七九一六八七五以段日而一得一秒二九七七七五兩數并得三秒二微三十五纎為縮初盈末平差置泛立較之半一十九秒七九一六八七五以段日一十五日二五為法除二次得八微五十一纎為縮初盈末立差以上為火星平立定三差之原土星盈厯立差二微八十三纎扣平差四秒一十微二十二纎減定差一十五分一十四秒六十一微積日積差一段一十一日五十刻一度六八三二四五八二八七五置第一段下泛平較內減其下泛立較餘五十秒九一七九七五為平立較以平立較加本段泛平差得一十五分一十四秒六十一微為盈定差置平立較內減泛立較之半三秒七四二六七五餘四十七秒一七五三以一段日十一日五十刻而一得四秒一十微二十二纎為盈平差置泛立數之半以一段日除二次得二微八十三纎為盈立差土星縮厯立差三微三十一纎加平差一秒五十一微二十六纎减定差一十一分一秒七十五微積日置一段泛平較內減其下泛立較餘二十一秒七七二三七五為平立較以平立較加入本段泛平差得一十一分一秒七十五微為縮定差置平立較內減泛立較之半四秒三七七四七五餘一十七秒三九四九以一段日一十一日五十刻為法除之得一秒五十一微二十六纎為縮平差置泛立較之半以一段日為法除得三微三十一纎為縮立差以上為土星平立定三差之原金星立差一微四十一纎加平差三纎減定差三分五十一秒五十五微積日積差置一段下泛平較與其泛立較相減餘一秒八六八一七五為平立較以加泛立差得三分五十一秒五十五微為定差置平立較與泛立數之半一秒八六四七二五相減餘三十四纎以段日一十一日五十刻為法除之得三纎為平差置泛立較之半以段日為法除二次得一微四十一纎為立差以上為金星平立定三差之原水星立差一微四十一纎加平差二十一微六十五纎減定差三分八十七秒七十微積日泛平差泛平較泛立較術同金星求得定差三分八十七秒七十微平差二十一微六十五纎立差一微四十一纎以上為水星平立定三差之原右五星皆以立差為秒平差為本定差為總五星各以段次因秒木土金水四星併本惟火星較本各以積日而積五星皆較總又各以積日乘之得各實測之度分五星積日皆以度率除周日得三百六十五度二十五分太各以四分之一為象限惟火星用象限之一減象限為盈初縮末限加象限為縮初盈末限其命度為日者為各取盈縮厯乘除之便其實積日之數即積度也大統厯志卷三

body:
  text: 大統厯志卷八宣城梅文鼎撰月食通軌録各有食之望下等數經望全分盈縮厯全分盈縮差全分遲疾厯全分遲疾限數遲疾差全分加減差全分定望全分某甲子將本日日出分推在夘時何刻望在何刻已下者退一日也按説見定朔望條夘時者舉例言其實即以日出分如發歛條求之便得某時刻又按其定望退一日法只據其小餘在日出分已下者斷之并不必求時刻也交汎全分定入遲疾厯定入遲疾限此限與前同者便不必書出損益分并行度按其實此處損益分不言何用似總不必書出定限行度晨分月出之時刻也先於復圓者有帶食日出分日入分昏分月出之時刻也復於初虧有帯食按載晨昏分者所以定更㸃也其帶食分只用日出入分不用晨昏葢晨刻日未出月則猶見昏前日已入月則已見也註誤天正赤道度天正黄道度交定度以上諸法皆與日食同推邜酉前後分法視定望小餘如在二千五百分已下者就為邜前分也如在已上者去減半日周五千分餘為邜後分也又如在七千五百分已下者内減去五千分就為酉前分也如在已上者去減一萬分餘為酉後分也已上已下皆指定望小餘而言按凡邜酉前後分皆據子午言之邜前分是距子正後之分也故即以小餘在夘前者定之邜後分是距午正前之分也故以小餘減半日周其餘則是自午正逆數以前距數也酉前分是距午正後之分也故以半日周減小餘其減不盡者則是自午正順數以後距數也酉後分是距子正前之分也故以小餘減日周其餘則是自子正逆數以前距數也推時差分法置日周一萬内減去邜前邜後分或酉前後分滿千分者命為十分滿百分者命為單分得為時差分也推食甚定分法置所推時差分加入定望小餘共得為食甚定分也按氣刻時三差皆起於唐長慶中宣明厯於日食用之月食則皆不用後之諸厯或有用月食時差者其數大約與日食相倣皆於近邜酉則差稍多近子午則差漸少其以之定食甚分則皆子前減子後加以加減其定望小餘而得也所異者朔食時差多望食時差少耳今依通軌所載推之則近邜酉者差反少近子午者差反多又不問子前子後皆以加定望小餘而無減法種種皆與厯經相反則何如不用之為得乎且日食何以有時差以月之掩日去日尚逺也日光尚在但不見耳據所不見而言之故以時而差若月食則不然闇虚者日氣所冲食則與月相著譬如呵氣著鏡光體盡虧一如晦朔安得有左右視之差乎此唐宋諸厯所以多不用也即曰用之所差不過九十餘分然亦不至反其所用如此也竊依元史所載月食時差法定之如左依厯經求月食甚定分法置卯酉前後分有千法實皆定三有百法實皆定二自相乗言十加定一子退二位去二子如四百七十八而一去二子不滿法又去一子以所定二子為百分一子為十分為時差子前以減子後以加皆加減定望分為食甚定分依發歛求之即食甚辰刻按卯酉前後分即前所推卯前卯後分或酉前酉後分自相乗者如求南北差法即以所得卯酉前後分為法與實也凡卯酉前後分皆自子午起筭以自相乗則近卯酉差多近子午差少矣退二位法同日食時差以得數後有百萬退作萬有十萬退作千而後歸除之也如四百七十八而一者是以四百七十八歸除之如四百七十八分為一分也子前減子後加者凡望時之月在日所衝故日在子前月乃在午前其日食午前減故月食亦子前減也日在子後月乃在午後日食午後加故月食亦子後加也其差多者不過一百三十分有竒而止故以四百七十八為法歸除之也推食甚入盈縮厯及食甚入盈縮差併食甚入盈縮厯行定度三法俱與日食同只換望日推月食入陰陽厯法視所推交定度如在交中度一百八十一度八九六七已下者便為入陽厯也如在已上者内減去交中度餘為入陰厯也按交中度數原生於陰陽厯月入陽厯則在黄道南行一百八十一度有竒畢復入黄道北而行陰厯一百八十一度有竒畢則又復入陽厯矣行陽厯陰厯各一次謂之交終半之為交中今交定度在一百八十一度已下是月尚在黄道南就為入陽厯度數也其在已上者是月已在黄道北故於交定度内減去一百八十一度八九六七餘者命為入陰厯度數也陽厯數自交初起筭陰厯數自交中起筭也推交前交後度法視所推月食入陰陽厯如在後凖一十五度五十分已下者便為交後度也如在前凖一百六十六度三九六八已上者置交中度内減去陰陽厯為交前度也按凡言交者皆月出入黄道十字相交之際也凡陰厯在後凖已下者是距陽厯交陰厯後未逺尚在十五度内故為陰厯交後度也凡陰厯在前凖已上者是逆距陰厯交陽厯前已近只在十五度内故為陰厯交前度也陽厯同十五度五十分者月食限一十三度五分或有十五度五十分而入食限者葢以盈縮差加減之則亦十三度有竒故以十五度五十分為食凖也其前凖度雖多逆計其所距後交之數亦同也推月食分秒法置月食限一十三度五分内減去交前或交後度十度定三單度定二按定子法疑有誤若如所云則月食必無十分者安得有既内外之分乎愚意當是十度定五單度定四也以定法八十七分去一為法除之不滿法去一子所定有三子為十分二子為單分得為月食分秒也不及減者必不食也十分已下者用三限辰刻法十分已下者用五限辰刻法按月食限度多於日食者闇虚大而月小也故不問陰陽厯只距交前後一十三度五分内即能相掩而有食也凡定望正當交度其食十五分漸離其處食分漸殺假如距交前後一度七十四分則於食十五分内減二分只食八分又如距交前後九度五十七分則於食十五分内減一十一分只食四分也故置食限一十二度五分以距交前後度減之即如於食十五分内減去若干分秒也其減不盡者則正是今所合食之分秒故以定法除之而得盖月食定法即十五分其食限之一也如食限不及減為不食者是距交前後度多於月食限是已在十三度五分之外闇虚雖大至此亦不能相掩斷為不食也推月食定用分法置月食分三十分減去所推月食分秒餘十分定三單分定二為實却以月食分秒十分定三單分定二按十分宜定一今加定三子者以分下有十有秒也故亦以定六子為百分法實共知定四子也為法乗之言十定一定有六子為百分五子為十分得為開方積立天元一於單微之下依平方法開之得為開方数有十定一復以四千九百二十分定五按以六分乗八百二十分得四千九百二十食分又按元史数同日為法乗開方数有十定一得数又以其前推得定限行度去四子空度去三子為法除之不滿法去一子定有二子為百分一子為十分得為所推定用分也定用分者亦月食自初虧復距食甚之時刻也然日食只十分而月食則有十五分者闇虚大也闇虚之大幾何曰大一倍何以知之以筭月食用三十分知之也依日食條論両圓相切法闇虚半徑十分月半徑五分両邉相切則両半徑聨為一直線共十五分為両心之距以此距線用闇虚心為心運作大圓正得全徑三十分也此大圓邉距闇虚邉四周各五分為両圓相切時月心所到之界其両之距十五分即大圓半徑常用為弦而以食甚時両心之距為勾食甚時月心侵入大圓邉之數為勾弦較其數與月食分秒同以此與大圓全徑相減餘即勾弦和和較相乗為股實開方積也其開方數為股即自虧復至食甚月心所行之白道也四千九百二十乗者何也依日食條論又是十分八百二十而用其六也盖所得月體又小於日一分也然厯經所用與日食同此不同者盖改率也或亦改三應數時所定而作史時未入如盈縮立成等耳推三限辰刻等法置所推食甚定分内減去定用分餘為初虧分也不及減者加日周減之復置食甚定分内加入定用分共得為復圓分也滿日周去之時刻依合朔推之按三限辰刻同日食理不復贅初虧時兩心之距為弦即大圓三十分半徑食甚時月心侵入大圓界八分為勾弦較自虧至甚月心所行之度分為股甚至復亦同此以月食八分為例餘可倣推又此係陽厯故月在闇虚南若陰厯反此論之推既内分法置月食限一十五分按厯經作月食既一十分今從之内減去所推月食分秒自單以下全分餘十分定二單分定三句誤按此處無十分當是有分定二十秒定一也為實却以月食分秒自單分以下分秒單分定二十秒定一為法乗之言十定一所定有五子為十分四子為單分得為開方積立天元一於單微之下依平方法開之得為開方數就置開方數十分定五單分定四按十分定五句誤此處開方數必無十分當作十秒定三有分定四也分加定四子者以有秒微也復以四千九百二十分定五為法乗之言十定一得數又以所推定限行度去四子空度去三子為法除之不滿法去一子所定有六子為百分五子為十分得為所推既内分也按厯經原是以既内分與一十分相減相乗此則改為一十五分今以大圓掩小圓率求得既内小平圓徑一十分與厯經合故斷從厯經也月食十分則既矣此時月體十分全入闇虚而月之邊正切闇虚之心兩心之距正得五分以此五分為半徑自闇虚心作小平圓其全徑十分其邊各距闇虚心五分為食既時月心所到之界過此界則為既内矣假如月食十二分食既時月心正掩小圓之邊食甚時月體則入闇虚内二分而月心亦侵入小平圓二分故即用此二分為勾弦較以與小平圓全徑相減餘為勾弦和和較相乗得積開方得股即月心從食既至食甚在闇虚内所行小平圓之白道也於是亦如前法變為度分而計其行率則知月入闇虚以後行至食甚所厯時刻之數而命為既内之分也此既内分食甚至復圓同論乙為闇虚心初虧時月心在甲以其邊切闇虚於庚兩心之距為乙甲與壬乙等大圓半徑十五分也為大弦食甚時月心行至丁丁甲度分為自虧至甚之行與甚至復丁戊之行等為大股丁乙三分食甚時兩心之距也為勾壬丁十二分食甚時月心侵入大圓内之數也為勾弦較食既時月心在丙丙心之距乙丙與生光之時己乙之距等小平圓半徑五分也為小弦丙丁為月心自既至甚之行與自甚至生光己下之行等為小股丁巳三分仍為勾午丁二分為食甚時月心侵入小平圓之數為勾弦較丙至丁所厯時刻與己丁時刻等是為既内分甲至丙所厯時刻與已至戊等是為既外分此以陰厯月食十二分為式餘皆倣論開方數壬丁十二丁癸十八相乗二一六平方開之得丁甲十四六九午丁二分丁艮八分相乗十六平方開之得丁丙四分推既外分法置所推定用分内減去既内分餘為既外分也按既外分者是月食初虧至食既生光至復圓所占時刻也原所推定用是自虧初復末中距食甚之數則是既内既外總數也故於其中減去既内所占時刻其餘便是既外時刻也推五限辰刻等法置食甚定分内減去定用分為初虧分初虧分加既外分為食既分食既分加既内分為食甚分食甚分加既内分為生光分生光分加既外分為復圓分也不及減者加日周減之滿日周去之推時刻同前按月食所以有五限辰刻異於日食者日食只十分故其食而既也即其食甚也纔食而既其光即生則其生光之分亦即其食甚也若月食則十五分自食既以至生光厯時且乆為刻皆殊中折二數以知食甚縂計虧復故有五限也以定用減小餘者所筭定用原是食甚距初虧之數也故以減食甚得初虧以既外加初虧及生光者所筭既外原是初虧距食既生光距復圓數也故以加初虧得食既以加生光得復圓至於所筭既内原是食既至生光折半之數即是食既生光中距食甚之數也故以加食既得食甚以加食甚得生光不及減加日周者是食甚在子正後初虧等在子正前也加滿日周去之者是食甚等在子正前復圓等在子正後也凡言時刻同前者皆用發歛也推月食入更㸃法視望下盈縮厯與太陽立成同日之日晨分就加一倍得數用五千分而一句誤一按當作五而下同得為更法分也定數滿法得十分不滿法得百分也將更法又用五千分而一得為㸃法分也定數滿法得百分不滿法得十分也句誤甚按當作滿法者百已上不滿法者二百已上也大約更法有千者則不滿法按更㸃倍晨分者凡日入後二刻半而昏日未出前二刻半而晨晨則辨色未昏則不禁行晨昏啓閉以此為節是益晝五刻損夜五刻聖人扶抑之道無所徃而不存也其晨分皆自本日子正距異之數夜之有晨分猶日之有半晝分也逆推子正前距昏之數正與相等故倍其晨分即為全夜之刻也于是以五除之即其夜每更所占時刻之數也假如晨分二千五百倍之五千五除之則知毎一更分占有一十分也滿法者是在五千分已上故知得數為千分不滿法者是在五千分已下故知得數為百分於是又置更法以五除之即其夜毎㸃所占刻數也假如更法分一千五除之則知毎㸃中占有二百分也其㸃法得數無論滿法不滿法縂是百分不必定數盖千已上數則不滿法豈有轉少作十分之理十分句誤又除法只是單五毎夜五更毎更五㸃五千分誤當作五而一或以五除之也推初虧等更㸃法視初虧分如在晨分已下者就加入晨分共為初虧更分也如在昏分已上者内減去昏分餘為初虧更分也却以元推更法分為法除之命起一更筭外得為初虧更數也將減餘不及滿更法數却以元推㸃法分為法除之命起一㸃筭外得為初虧㸃數也次四限更㸃倣此而推各得更㸃也若在日入已上昏分已下者命為昏刻若在日出以下晨分以上者命為晨刻皆無更㸃按初虧等分如在晨分已下者是在子後也加入晨分是逆從子前昏刻筭起也其在昏分已上是在昏後也故減去昏分即是減去晝刻截從初昏筭起也究之二者則搃是從初更初㸃起筭其加後減後則知此所得數距初更初㸃已若干數於是以本日更法為法除之其滿過更法有幾數便知已過幾更故筭外命為更數也其不滿更法而餘者則正是初入此更已來未滿之數故又以㸃法除之其滿過㸃法有幾數便知在此更中已過幾㸃故筭外命為㸃數便知所推初虧等尚在第幾更第幾㸃中未滿也其有搃不滿更法數者則只是初更其有以㸃法除縂不滿法者則只是初㸃也推月食起復方位法視月食入隂陽厯如是陽厯者初起東北食甚正北復圓於西北也如是隂厯者初起東南食甚正南復圓於西南也若食在八分已上者無論隂陽厯皆初起正東復圓於正南也按月食起復方位主月體言之即人所見月之上下左右也以卯位言之則東為下西為上北為左南為右也以酉位言之則東為上西為下南為左北為右也月食入隂陽厯亦主月道言之如是陽厯食是月在日道南闇虚掩之者在其北故食起東北甚於正北復於西北也如是隂厯食是月在日道北闇虚掩之者在其南故食起東南甚於正南復於西南也其食在八分已上者是月食闇虚正相掩而過故食起正東復於正西也凡闇虚在日所冲太陽毎日行一度闇虚隨之而移月之行天既視闇虚為速故其食也皆闇虚光在東月自西來道有必經無所於避遂入其中而為所掩既受謫矣則始能行而出於闇虚之東却視闇虚又在月西故月食虧初皆在東復末皆在西也又按厯經此亦據午地言之推月有𢃄食分法同日食推月有𢃄食例昏月未出已復光若干月已出見復光若干晨月未入見復光若干月已入未復光若干昏月未出已食若干月已出見食若干晨月未入見食若干月已食不見食若干按月帶食法同日食而只互易其晨昏書法者何也葢月食於望望者日月相望故日出則月入月出則日入故易日之昏為月之晨易日之晨為月之昏也其所以同者何也假如日入分在復圓分已下是復圓在日入月出後於日為見食甚不見復末者於月則見為復末不見食甚也若日出分在復圓分已下是復圓在日出月入後於日為見復末不見食甚者於月則為見食甚不見復末也之二者總是以食甚分減其日出入分其所推帶食分則總是日月出入前距食甚之數其以減食分而餘者亦總是日月出入後未復光之數故總謂之已復光未復光而以所推帶食分録於前也又如日入分在初虧分已上是初虧在日入月出前於日為見虧初不見食甚者於月則為見食甚不見虧初也若日出分在初虧分已上是食甚在日出月入後於日為見食甚不見虧初者於月則為見虧初不見食甚也之二者總是以日出入分減其食甚分其所推帶食分則總是日月出入後距食甚之數其以減食分而餘者亦總是日月出入前已食之數故總謂之見食不見食而以所推帶食分録於後也餘詳日食又按厯經月食既者以既内分減帶食差餘進一位如既外分而一以減既分即月帶食出入所見之分不及減者為帶食既出入葢凡所推帶食差是食甚所距日出入數今以既内分減之而餘者即是日出入後距食既前或日出入前距生光後其間所有時刻也進一位者即是以既分乗之也又以既外分除之則知其食既生光距日出入時於既外全數中分得㡬許時刻即知其於食既全數内分得㡬許食分也故以減月食既十分即為月帶食出入之分也不及減者是帶食差少於既内分其日出入分已在既内分内故為帶食既出入也推食甚月離黄道宿次度法置元推食甚入盈縮厯行定度全分如是盈厯者加半周天一百八十二度六二八七五及天正黄道箕宿度共得為黄道定積度也如是縮厯者正加天正黄道箕宿度内減去七十五秒餘為黄道定積度也無論盈縮厯皆以其黄道各宿次積度鈐挨及減之餘為食甚月離黄道某宿次度分也按月食黄道之積度者逆計月離度前距天正日躔宿度之數也元推食甚入盈縮厯行定度則是所求日躔距天正宿度數乃月食所冲也如日在北正月食於南正故盈厯加半周天便是食甚月離宿度又加天正箕宿度便知食甚月離距天正黄道箕宿初度若干也其縮厯行定度則是日躔距夏至宿度數故即用其數為月離葢月食日冲日躔夏至宿後第㡬度月食亦即在冬至宿後第㡬度故不必加半周天也内減去七十五秒者盈厯縮厯相距半嵗周不及半周天七十五秒其今嵗縮厯以後距來嵗盈厯亦止半嵗周若論其後距本嵗盈厯則反多一分五十秒即多於半周天七十五秒也減此益彼即各相距半周天平分天度而相望其冲也其止加天正箕宿度意同盈厯其不問盈縮皆減黄道積度鈐是筭外命宿度同日食不贅依授時厯經黄赤道法勿菴補定求四正後赤道積度置天正冬至所在宿赤道全度以天正赤道減之餘為距後度以赤道宿度累加之即得其宿距冬至後赤道積度加滿象限去之為四正宿距後度亦以赤道宿度累加之滿象限去之即各得其宿距春分夏至秋分後赤道積度按四正者四時正氣即二至二分也凡天正赤道度是前距其宿初度之數故以減其宿全度即各得後距其宿末度之數也於是以後宿赤道纍而加之即知各至後各宿距冬至度所積之度也滿象限去之者加滿象限是其宿當四正所在故減去象限即知四正所在後距其宿末度之數也於是又以赤道各宿度累而加之即各得四正後每象宿所距四正度之數也求赤道變黄道置各宿距四正後赤道積度用黄赤道立成視在至後者以第三格赤道積度相挨者減之餘有十定三有分定二為實以上第二格黄道率乗之不用乗只加定四子以下第四格黄道率為法除之有度去四有十去三不滿法再去一視定有四子為度三子為十分加入第一格黄道積度即為其宿距至後黄道積度其夏至後再加半周天即各得其宿距天正黄道積度也若在分後者以第一格赤道積度相同者減之只用小餘有十定三有分定二為實以下第四格黄道率為法有度定四空度定三乗之言十定一得數以上第二格赤道率除之不用除只去四子視定有四子為度三子為十分加入第三格黄道積度即得其宿距分後積度其春分後再加一象限其秋分後再加三象限即各得其宿距天正黄道積度也於是各置其宿距天正黄道積度以其前宿黄道積度減之即各得其宿黄道本度也秒就近約為分按至後不用乗者其立成黄道率只是一度乗過數不動故只加定四子也分後不用除者其立成赤道率亦是一度除過數亦不動故只虚去四子也夏至後加半周天春分後加一象限秋分後加三象限者此所求黄道積度皆距四正起筭故各以四正距天正黄道數加之即其宿前距天正之數也葢至後黄道雖減於赤道分後黄道雖加於赤道其實至四立之後則加之極而反減減之極而反加總計一象皆得九十一度有竒此天道所以如環平陂徃復間不容髪也減前宿積度為其宿本度者積度既是距天正數原包有前宿在内故減之即得本度也秒就近約為分者凡秒五十已上收為分已下棄之就整數也其七十五秒寄虚度求天正冬至黄道度置周天度三百六十五度二五七五内減去天正前一宿距天正黄道積度餘命為天正冬至宿黄道度分也若逕求者置象限以其年天正赤道度減之餘為天正前宿距秋分後赤道積度依赤道變黄道法求出其宿距分後黄道積度以減象限餘即命為天正黄道度按周天度是自天正後積至天正前黄道總數故減去前宿距天正黄道積度即得天正距所在宿初度之數也逕求法除象限者即是自天正前距秋分後赤道總數也内減去天正赤道度其餘即是前宿距秋分後赤道積度也赤道變黄道法即是以立成第一格積度減餘以第四格度率乗以第一格度率除加入第三格積度而命為前宿距秋分後黄道積度也又以減象限者此所為象限即是自天正前距秋分後黄道總數故減去前宿距秋分黄道積度其餘即是天正冬至距其宿初度黄道之數也求黄道宿積度定鈐置天正冬至宿黄道度及分如入其宿距至後黄道積度及分共得為天正冬至宿黄道定積度以各宿黄道度累加之即各得其宿黄道定積度按分至每嵗有差黄道即因而易即不能毎嵗歩之當於六十六年嵗差一度時更定度鈐始為無弊也凡冬至所在宿皆有前後距其黄道皆減於赤道今所推其宿至後積度是自冬至日躔後距其宿末度黄道數其天正黄道宿度則是自冬至日躔前距其宿初度黄道數也合二數則是自其宿初度距其宿末度總數故即命為天正宿定積度也於是以各宿黄道度累加之即各得其宿所距天正宿初度之數而命為定積度也求日月食甚宿次黄道度及分秒法同通軌又術置所推食甚盈縮厯縮厯加半周天為黄道定積度月食盈縮厯俱加半周天滿周天分去之為黄道定積度皆逕以距天正黄道積度相挨者減之即各得日月食甚黄道宿度及分秒按此法不用定積度鈐故亦不加天正黄道度然必毎年歩定黄道積度方可用之也赤道宿度角十二一十亢九二十氐十六三十房五六十心六五十尾十九一十箕十四十右東方七宿七十九度二十分斗二十五二十牛七二十女十一三五虚八九十五太危十五四十室十七一十壁八六十右北方七宿九十三度八十分太奎十六六十婁十一八十胃十五六十昴十一三十畢十七四十觜初五參十一一十右西方七宿八十三度八十五分井三十三三十鬼二二十栁十三三十星六三十張十七二十五翼十八七十五軫十七三十右南方七宿一百八度四十分黄赤道立成積度度率積度度率積差差率附郭守敬傳初劉秉忠以大明厯自遼金承用二百餘年浸以後天議欲脩正而卒十三年江左既平世祖思用其言遂以守敬與王恂率南北日官分掌測騐推歩於下而命張文謙與樞宻張易為之主領裁奏於上左承許衡參預其事守敬首言厯之本在於測騐而測騐之器莫先儀表今司天渾儀宋皇祐中汴京所造不與此處天度相符比量南北二極約差四度表石年深亦復欹側守敬乃盡考其失而移置之既又别圖高爽地以木為重棚創作簡儀高表用相比覆又以為天樞附極而動昔人嘗展管望之未得其的作候極儀極辰既位天體斯正作渾天象象雖形似莫適所用作玲瓏儀以表之矩方測天之正圜莫若以圜求圜作仰象古有經緯結而不動守敬易之作立運儀日有中道月有九行守敬一之作證理儀表高景虛罔象非真作景符月雖有明察景則難作闚几厯法之騐在於交㑹作日月食儀天有赤道輪以當之兩極低昂標以指之作星晷定時儀又作正方案九表懸正儀座正儀為四方行測者所用又作仰規覆矩圖異方渾葢圖日出入永短圖與上諸儀互相參考十六年改局為太史院以恂為太史令守敬為同知太史院事給印章立官府及奏進儀表式守敬當帝前指陳理數至於日晏帝不為倦守敬因奏唐一行開元間令南宫說天下測景書中見者凡十三處今疆宇比唐猶大若不逺方測騐日月交食分數時刻不同晝夜長短不同日月星辰去天髙下不同即日測騐人少可先南北立表取直測景帝可其奏遂設監候官一十四員分道而出東至高麗西極滇池南踰珠崖北盡鐵勒四海測騐凡二十七所十七年新厯告成守敬與諸臣同上奏曰臣等竊聞帝王之事莫重於厯自黄帝迎日推䇿帝堯以閏月定四時成嵗舜在璇璣玉衡以齊七政爰及三代厯無定法周秦之間閏餘乖次西漢造三統厯百二十年而後是非始定東漢造四分厯七十年而儀式方備又百二十一年劉洪造乾象厯始悟月行有遲疾及魏黄初間始以日食課其疎宻魏楊偉作景初厯始立交食起虧術又百八十年姜岌造三紀甲子元厯始悟以月食推騐日宿度所在又五十七年何承天造元嘉厯始悟以朔望及弦皆定大小餘及以晷景騐氣又六十五年祖冲之造大明厯始悟太陽有嵗差之數極星去不動處一度餘又五十二年張子信始悟日月交道有表裏五星有遲疾畱逆又三十三年張胄𤣥造大業厯始立五星入氣加減法及月應食不食術劉焯造皇極厯始悟日行有盈縮及立推黄道月道又三十五年傅仁均造戊寅元厯頗采舊議始用定朔又四十六年李淳風造麟徳厯以古厯章蔀元首分度不齊始為總法用進朔以避晦晨月見又六十三年一行造大衍厯始以朔有四大三小定九服交食軌漏之異及創立嵗星差合術又九十四年徐昂造宣明厯始悟日食有氣刻時三差人七十二年邉岡造崇𤣥厯始立相減相乗法以求黄道月道又六十三年王朴造欽天厯始變五星法遲留逆行舒亟有漸又九十八年周琮造明天厯始悟日法積年自然之數又三十六年姚舜輔造紀元厯始悟食甚泛餘差數以上計千一百八十二年厯經七十改其創法者十有三家自是又百七十四年聖朝専命臣等改修新厯臣等用創造簡儀高表憑其測實數所考正者凡七事一日冬至自丙子年立冬後依每日測到晷景逐日取對冬至前後日差同者為凖得丁丑年冬至在戊戌日夜半後八刻半又定丁丑夏至在庚子日夜半後七十刻又定戊寅冬至在癸邜日夜半後三十三刻巳邜冬至在戊申日夜半後五十七刻庚辰冬至在癸丑日夜半後八十一刻各減大明厯十八刻逺近相符前後應凖二曰嵗餘自大明厯以來凡測景騐氣得冬至時刻真數者有六用以相距各得其時合用嵗餘考騐四年相符不差仍自宋大明壬寅年距至今日八百一十年每嵗合得三百六十五日二十四刻二十五分其二十五分為今厯嵗餘合用之數三曰日躔用至元丁丑四月癸酉望月食既推求日躔得冬至日躔赤道箕宿十度黄道箕九度有竒仍憑每日測到太陽躔度或憑星測月或憑月測日或逕憑星度測日立術推筭起自丁丑正月至巳邜十二月凡三年共得一百三十四事皆躔於箕與月食相符四曰月離自丁丑以來至今憑每日測到逐時太陰行度推算變從黄道求入轉極遲疾并平行處前後凡若干轉計五十一事内除去不眞的外有三十事得大明厯入轉後天又因考騐交食加大明厯三十刻與天道合五曰入交自丁丑五月以來憑毎日測到月道去極度數比擬黄道去極度得月道交於黄道出入度仍依日食法度推求皆有食分得入交時刻與大明厯所差不多六曰二十八宿距度自漢太初厯以來距度不同互有損益大明厯則於度下餘分附以太半少皆私意牽就未嘗實測其數今新儀皆細刻周天度分毎度為三十六分以距線代管窺宿度餘分並依實測不以私意牽就七曰日出入晝夜刻大明厯日出入晝夜刻皆據汴京為凖其刻數與大都不同今更以本方北極出地高下黄道出入内外度立術推求毎日日出入晝夜刻得夏至極長日出寅正二刻日入戌初二刻晝六十二刻夜三十八刻冬至極短日出辰初二刻日入申正二刻晝三十八刻夜六十二刻永為定式所創法凡五事一曰太陽盈縮用四正定氣立為升降限依立招差求得毎日行分初末極差積度比古為宻二曰月行遲疾古厯皆用二十八限今以萬分日之八百二十分為一限凡析為三百三十六限依垜叠招差求得轉分進退其遲疾度數逐時不同葢前所未有三曰黄赤道差舊法以一百一度相減相乗今依筭術勾股弧矢方圓斜直所容求到度數積差差數與天道實脗合四曰黄赤道内外度據累年實測内外極度二十三度九十分以圓容方直矢截勾股為法求毎日去極與所測相符五曰白道交周舊法黄道變推白道以斜求斜今用立渾比量得月與赤道正交距春秋二正黄赤道正交一十四度六十六分擬以為法推逐月毎交二十八宿度分於理為盡十九年恂卒時厯雖頒然其推歩之法與夫立成之數尚皆未有定稿守敬於是比次篇類整齊分秒裁為推歩七卷立成二卷厯議擬稿三卷轉神選擇二卷上中下三厯注式十二卷二十三年繼為太史令遂上表奏進又有時候箋注二卷修改源流一卷其測騐書有像象法式二卷二至晷景考二十卷五星細行考五十卷古今交食考一卷新測二十八舍雜坐諸星入宿去極一卷新測無名諸星一卷月離考一卷並藏之官大統厯志卷八
